name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.14"

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run ruff
        run: uv run ruff check .

  typecheck:
    name: Mypy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run mypy
        run: uv run mypy

  test:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run pytest
        run: uv run pytest

  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Export locked dependencies for pip-audit
        run: uv pip freeze > requirements.txt

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt
          require-hashes: false

  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - typecheck
      - test
      - security-audit
    steps:
      - name: Generate summary
        run: |
          echo "## Workflow status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ref: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ruff | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mypy | ${{ needs.typecheck.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pytest | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency Audit | ${{ needs.security-audit.result }} |" >> "$GITHUB_STEP_SUMMARY"
